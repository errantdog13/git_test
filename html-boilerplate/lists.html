<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Lists in HTML</h1>
    <h2>Unordered List</h2> 

    <ul>
        <li>Steak</li>
        <li>Chicken</li>
        <li>Fish</li>
    </ul>
    <h2>Ordered List</h2>
    <ol>
        <li>Go to gym</li>
        <li>Buy groceries</li>
        <li>Call mom</li>
    </ol>
    
</body>
</html>
